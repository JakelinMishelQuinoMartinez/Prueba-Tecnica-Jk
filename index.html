<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Tickets</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">

        <header class="top-panel">

            <h1>Sistema de Tickets de Soporte</h1>

            <div class="controls">
                <button id="btnNuevoTicket">
                    + Generar Nuevo Ticket
                </button>
                <div class="filters">
                    <div class="filter-group">
                        <label for="filtroEstado">
                            Estado
                        </label>
                        <select id="filtroEstado">
                            <option value="todos">Todos</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="en proceso">En Proceso</option>
                            <option value="resuelto">Resuelto</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filtroPrioridad">
                            Prioridad
                        </label>
                        <select id="filtroPrioridad">
                            <option value="todas">Todas</option>
                            <option value="alta">Alta</option>
                            <option value="media">Media</option>
                            <option value="baja">Baja</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <section class="table-section">

            <h2>Historial de Tickets</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Departamento</th>
                            <th>Tipo</th>
                            <th>Prioridad</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="ticketsBody">
                    </tbody>
                </table>
            </div>

        </section>

    </main>

<!-- MODAL NUEVO TICKET -->

    <div class="modal" id="modalTicket">

        <div class="modal-content">

            <div class="modal-header">
                <h2>Nuevo Ticket</h2>
            </div>

            <form id="ticketForm">

                <div class="form-group">
                    <label for="nombre">
                        Nombre del solicitante
                    </label>
                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Ingrese el nombre">
                </div>

                <div class="form-group">
                    <label for="departamento">
                        Departamento
                    </label>
                    <select
                        id="departamento"
                        name="departamento">
                        <option value="">
                            Seleccione un departamento
                        </option>
                        <option value="Contabilidad">
                            Contabilidad
                        </option>
                        <option value="Recursos Humanos">
                            Recursos Humanos
                        </option>
                        <option value="Ventas">
                            Ventas
                        </option>
                        <option value="Soporte">
                            Soporte
                        </option>
                        <option value="Gerencia">
                            Gerencia
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tipoProblema">
                        Tipo de problema
                    </label>
                    <select
                        id="tipoProblema"
                        name="tipoProblema">
                        <option value="">
                            Seleccione un tipo
                        </option>
                        <option value="Hardware">
                            Hardware
                        </option>
                        <option value="Software">
                            Software
                        </option>
                        <option value="Red">
                            Red
                        </option>
                        <option value="Correo">
                            Correo
                        </option>
                        <option value="Acceso">
                            Acceso
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="descripcion">
                        Descripción
                    </label>
                    <textarea
                        id="descripcion"
                        name="descripcion"
                        rows="4"
                        placeholder="Describa el problema"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="prioridad">
                        Prioridad
                    </label>
                    <select
                        id="prioridad"
                        name="prioridad">
                        <option value="">
                            Seleccione una prioridad
                        </option>
                        <option value="alta">
                            Alta
                        </option>
                        <option value="media">
                            Media
                        </option>
                        <option value="baja">
                            Baja
                        </option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button
                        type="button"
                        id="btnCancelar"
                        class="btn-secondary">
                        Cancelar
                    </button>
                    <button
                        type="submit"
                        class="btn-primary">
                        Guardar Ticket
                    </button>

                </div>

            </form>

        </div>

    </div>
    <script src="main.js"></script>
</body>
</html>
